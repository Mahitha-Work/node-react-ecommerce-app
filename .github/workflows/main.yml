name: React CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Node.js environment (matching your older React 16 project)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: '16' # React 16 and react-scripts v3 work best with Node 16
        cache: 'npm'

    # 3. Install dependencies
    - name: Install dependencies
      run: npm ci

    # 4. Run tests (CI=true prevents Jest from entering watch mode)
    - name: Run tests
      run: npm test -- --watchAll=false
      env:
        CI: true

    # 5. Build the production application
    - name: Build project
      run: npm run build

    # 6. (Optional) Upload build artifacts so you can deploy them later
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: production-files
        path: build/
